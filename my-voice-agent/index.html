<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI CALLING AGENT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #0d1b2a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px;
      width: 460px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 20px;
      color: #60a5fa;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-bottom: 24px;
    }

    .chat-log {
      height: 320px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px;
    }

    .chat-log::-webkit-scrollbar {
      width: 4px;
    }

    .chat-log::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
    }

    .bubble.you {
      background: #1d4ed8;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: #1e3a2e;
      border-left: 3px solid #22c55e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble .who {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .bubble.you .who { color: #93c5fd; }
    .bubble.ai .who { color: #4ade80; }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
    }

    input[type="text"]::placeholder {
      color: #475569;
    }

    button#sendBtn {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#sendBtn:hover {
      background: #1d4ed8;
    }

    button#sendBtn:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    button#micBtn {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 16px;
      cursor: pointer;
      transition: border 0.2s, background 0.2s;
    }

    button#micBtn:hover {
      border-color: #3b82f6;
    }

    button#micBtn.recording {
      background: #7f1d1d;
      border-color: #ef4444;
    }

    button#micBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 12px;
      min-height: 18px;
    }

    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin-top: 4px;
      color: #4ade80;
      padding: 0;
    }

    .speak-btn:hover {
      color: #86efac;
    }

    .welcome {
      text-align: center;
      color: #334155;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>AI CALLING AGENT</h1>
  <p class="subtitle"></p>

  <div class="chat-log" id="chatLog">
    <p class="welcome">
      Say hi or ask anything!<br/>
      Type below and press Send
    </p>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="userInput"
      placeholder="Type your message..."
      autocomplete="off"
    />
    <button id="micBtn" title="Speak">🎙</button>
    <button id="sendBtn">➤</button>
  </div>

  <div id="status"></div>

</div>

<script>
  const chatLog = document.getElementById("chatLog");
  const userInput = document.getElementById("userInput");
  const micBtn = document.getElementById("micBtn");
  const sendBtn = document.getElementById("sendBtn");
  const status = document.getElementById("status");
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isRecording = false;

  function addBubble(who, text) {
    const welcome = chatLog.querySelector(".welcome");
    if (welcome) welcome.remove();

    const bubble = document.createElement("div");
    bubble.className = `bubble ${who}`;

    const label = document.createElement("div");
    label.className = "who";
    label.textContent = who === "you" ? "🧑 You" : "🤖 AI";
    bubble.appendChild(label);

    const msg = document.createElement("div");
    msg.textContent = text;
    bubble.appendChild(msg);

    if (who === "ai") {
      const speakBtn = document.createElement("button");
      speakBtn.className = "speak-btn";
      speakBtn.textContent = "🔊 Hear this";
      speakBtn.onclick = () => speakOpenAI(text);
      bubble.appendChild(speakBtn);
    }

    chatLog.appendChild(bubble);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function speakText(text) {
    if (recognition && isRecording) {
      recognition.stop();
    }
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-IN";
    utterance.rate = 0.95;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find((voice) =>
      voice.lang.includes("en") && voice.name.toLowerCase().includes("female")
    ) || voices.find((voice) => voice.lang.includes("en"));

    if (preferred) utterance.voice = preferred;

    status.textContent = "🔊 Speaking...";
    utterance.onend = () => {
      status.textContent = "";
    };

    window.speechSynthesis.speak(utterance);
  }

  async function speakOpenAI(text) {
    status.textContent = "🔊 Speaking...";

    try {
      if (recognition && isRecording) recognition.stop();

      const response = await fetch("/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      const mediaSource = new MediaSource();
      const audio = new Audio();
      audio.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener("sourceopen", async () => {
        const sourceBuffer = mediaSource.addSourceBuffer("audio/mpeg");
        const reader = response.body.getReader();

        audio.play();

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            mediaSource.endOfStream();
            break;
          }

          await new Promise(resolve => {
            if (!sourceBuffer.updating) return resolve();
            sourceBuffer.addEventListener("updateend", resolve, { once: true });
          });

          sourceBuffer.appendBuffer(value);
        }
      }, { once: true });

      audio.onended = () => {
        status.textContent = "";
        URL.revokeObjectURL(audio.src);
      };
    } catch (err) {
      console.error("Voice error:", err);
      speakText(text);
      status.textContent = "";
    }
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    if (recognition && isRecording) {
      recognition.stop();
    }

    addBubble("you", message);
    userInput.value = "";
    sendBtn.disabled = true;
    status.textContent = "🧠 Thinking...";

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await response.json();
      const reply = data.reply;

      addBubble("ai", reply);
      speakOpenAI(reply);

      status.textContent = "";
    } catch (err) {
      addBubble("ai", "❌ Something went wrong. Is your server running?");
      status.textContent = "";
      console.error(err);
    }

    sendBtn.disabled = false;
    micBtn.disabled = false;
    userInput.focus();
  }

  function setRecordingState(recording) {
    isRecording = recording;
    micBtn.classList.toggle("recording", recording);
    micBtn.textContent = recording ? "⏹" : "🎙";
  }

  function setupSpeechRecognition() {
    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition is not supported in this browser";
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-IN";
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      setRecordingState(true);
      status.textContent = "🎙 Listening...";
    };

    recognition.onresult = (event) => {
      let transcript = "";
      for (let i = event.resultIndex; i < event.results.length; i += 1) {
        transcript += event.results[i][0].transcript;
      }
      userInput.value = transcript.trim();
    };

    recognition.onerror = () => {
      setRecordingState(false);
      status.textContent = "Mic input failed. Try again.";
    };

    recognition.onend = () => {
      const transcript = userInput.value.trim();
      setRecordingState(false);
      if (transcript) {
        sendMessage();
      } else {
        status.textContent = "";
      }
    };
  }

  sendBtn.addEventListener("click", sendMessage);
  micBtn.addEventListener("click", () => {
    if (!recognition) {
      status.textContent = "Speech recognition is not supported in this browser.";
      return;
    }

    if (isRecording) {
      recognition.stop();
      return;
    }

    userInput.value = "";
    recognition.start();
  });
  userInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") sendMessage();
  });

  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };

  setupSpeechRecognition();
</script>
</body>
</html>
