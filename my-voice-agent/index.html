<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI CALLING AGENT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1b2a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px;
      width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 20px;
      color: #60a5fa;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── Chat log ── */
    .chat-log {
      height: 320px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px;
    }

    .chat-log::-webkit-scrollbar {
      width: 4px;
    }
    .chat-log::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    /* ── Message bubbles ── */
    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
    }

    .bubble.you {
      background: #1d4ed8;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: #1e3a2e;
      border-left: 3px solid #22c55e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble .who {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .bubble.you .who { color: #93c5fd; }
    .bubble.ai  .who { color: #4ade80; }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
    }

    input[type="text"]::placeholder {
      color: #475569;
    }

    button#sendBtn {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#sendBtn:hover {
      background: #1d4ed8;
    }

    button#sendBtn:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    /* ── Status ── */
    #status {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── Speaker button ── */
    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin-top: 4px;
      color: #4ade80;
      padding: 0;
    }

    .speak-btn:hover {
      color: #86efac;
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      color: #334155;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>AI CALLING AGENT</h1>
  <p class="subtitle"></p>

  <!-- Chat messages appear here -->
  <div class="chat-log" id="chatLog">
    <p class="welcome">
      Say hi or ask anything!<br/>
      Type below and press Send
    </p>
  </div>

  <!-- Input box + send button -->
  <div class="input-area">
    <input
      type="text"
      id="userInput"
      placeholder="Type your message..."
      autocomplete="off"
    />
    <button id="sendBtn">➤</button>
  </div>

  <!-- Status text -->
  <div id="status"></div>

</div>

<script>
  // ── Elements ──
  const chatLog   = document.getElementById("chatLog");
  const userInput = document.getElementById("userInput");
  const sendBtn   = document.getElementById("sendBtn");
  const status    = document.getElementById("status");

  // ── Add a message bubble to chat ──
  function addBubble(who, text) {
    // Remove welcome message on first message
    const welcome = chatLog.querySelector(".welcome");
    if (welcome) welcome.remove();

    // Create bubble
    const bubble = document.createElement("div");
    bubble.className = `bubble ${who}`;

    // Label
    const label = document.createElement("div");
    label.className = "who";
    label.textContent = who === "you" ? "🧑 You" : "🤖 AI";
    bubble.appendChild(label);

    // Message text
    const msg = document.createElement("div");
    msg.textContent = text;
    bubble.appendChild(msg);

    // Speak button (only for AI messages)
    if (who === "ai") {
      const speakBtn = document.createElement("button");
      speakBtn.className = "speak-btn";
      speakBtn.textContent = "🔊 Hear this";
      speakBtn.onclick = () => speakElevenLabs(text);
      bubble.appendChild(speakBtn);
    }

    chatLog.appendChild(bubble);

    // Auto scroll to bottom
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  // ── Speak text using browser voice ──
  function speakText(text) {
    // Stop any current speech
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    // Voice settings
    utterance.lang   = "en-IN"; // Indian English
    utterance.rate   = 0.95;    // Speed (1 = normal)
    utterance.pitch  = 1.0;     // Pitch
    utterance.volume = 1.0;     // Volume

    // Pick a good voice if available
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
      v.lang.includes("en") && v.name.includes("Female")
    ) || voices.find(v =>
      v.lang.includes("en")
    );
    if (preferred) utterance.voice = preferred;

    status.textContent = "🔊 Speaking...";
    utterance.onend = () => {
      status.textContent = "";
    };

    window.speechSynthesis.speak(utterance);
  }

  // ── Speak using ElevenLabs human voice ──
async function speakElevenLabs(text) {
    status.textContent = "🔊 Speaking...";

    try {
        const response = await fetch("/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text }),
        });

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);
        audio.play();

        audio.onended = () => {
            status.textContent = "";
        };
    } catch (err) {
        console.error("Voice error:", err);
        // Fallback to browser voice if ElevenLabs fails
        speakText(text);
    }
}
  // ── Send message to Python server ──
  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    // Show user message
    addBubble("you", message);

    // Clear input
    userInput.value = "";

    // Disable button while waiting
    sendBtn.disabled = true;
    status.textContent = "🧠 Thinking...";

    try {
      // Send to Python server
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message }),
      });

      const data = await response.json();
      const reply = data.reply;

      // Show AI reply
      addBubble("ai", reply);

      // Auto speak the reply
        speakElevenLabs(reply);


      status.textContent = "";

    } catch (err) {
      addBubble("ai", "❌ Something went wrong. Is your server running?");
      status.textContent = "";
      console.error(err);
    }

    // Re-enable button
    sendBtn.disabled = false;
    userInput.focus();
  }

  // ── Send on button click ──
  sendBtn.addEventListener("click", sendMessage);

  // ── Send on Enter key ──
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // ── Load voices when ready ──
  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };
</script>
</body>
</html>
